<html lang="ko">

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh; width: 100vw; background-color: #05050a; overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
    }
    canvas { display: block; outline: none; }
    
    #ui-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 660px; height: 800px; max-height: 95vh; pointer-events: none; z-index: 10; }
    #ui-container > div { pointer-events: auto; }
    
    .glass-panel { position: relative; background: rgba(10, 12, 20, 0.7) !important; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08) !important; border-top: 1px solid rgba(255, 255, 255, 0.2) !important; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5) !important; border-radius: 12px; overflow: auto; }
    
    .modern-input { background: rgba(255, 255, 255, 0.05) !important; color: #fff !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 6px !important; padding: 10px 10px !important; font-family: 'Noto Sans KR', sans-serif; transition: all 0.3s ease; box-sizing: border-box; }
    .modern-input:focus { outline: none; background: rgba(255, 255, 255, 0.1) !important; border-color: #00e5ff !important; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3) !important; }
    .number-input { width: 35px !important; padding: 10px 5px !important; text-align: center; }
    .modern-btn { background: linear-gradient(135deg, #007bff, #00e5ff) !important; color: #fff !important; border: none !important; border-radius: 8px !important; text-transform: uppercase; letter-spacing: 1px; font-weight: 700 !important; font-family: 'Noto Sans KR', sans-serif; transition: all 0.3s ease; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .modern-btn:hover { box-shadow: 0 0 20px rgba(0, 229, 255, 0.6) !important; transform: translateY(-2px); cursor: pointer; }
    .ghost-btn { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: #aaa !important; border-radius: 6px !important; transition: all 0.3s ease; cursor: pointer; }
    .ghost-btn:hover { background: rgba(255, 255, 255, 0.1) !important; color: #fff !important; border-color: rgba(255, 255, 255, 0.3) !important; }
    input[type="checkbox"] { accent-color: #00e5ff; width: 16px; height: 16px; margin-right: 10px; cursor: pointer; }
    input[type="range"] { width: 100%; accent-color: #00e5ff; cursor: pointer; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; outline: none; -webkit-appearance: none; margin-top: 10px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #00e5ff; cursor: pointer; box-shadow: 0 0 10px rgba(0,229,255,0.8); }
    .futuristic-title { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
    select option { background: #0a0c14; color: #fff; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 229, 255, 0.5); }

    .lib-item { font-size: 32px; padding: 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.05); text-align:center; }
    .lib-item:hover { background: rgba(0, 229, 255, 0.2); transform: scale(1.1); }
    .lib-item img { width: 40px; height: 40px; object-fit: contain; }

    #fsBtn { position: fixed; right: 10px; top: 10px; z-index: 1000; font-size: 11px; letter-spacing: 1px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(10,12,20,0.8); color: #fff; padding: 10px 15px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px); font-family: 'Orbitron', sans-serif; }
    #fsBtn:hover { background: rgba(0, 229, 255, 0.2); border-color: #00e5ff; }

    .ad-item-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.05); }
    .ad-item-text { color: #ccc; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
  </style>
</head>
<body>
  
<button id="fsBtn">🔲 FULLSCREEN</button>
<div id="ui-container"></div>

<script>
// 💡 방금 메모장에 복사해둔 당신의 보물 지도로 아래 내용을 교체해 주세요!
const firebaseConfig = {
  apiKey: "AIzaSyDnHCvo1Mot1gjKbWpbOBP_zHieYmQa9UY",
  authDomain: "peanutrace.firebaseapp.com",
  databaseURL: "https://peanutrace-default-rtdb.firebaseio.com/",
  projectId: "peanutrace",
  storageBucket: "peanutrace.firebasestorage.app",
  messagingSenderId: "551828558031",
  appId: "1:551828558031:web:9a7c99d57d266a79b6a7ba"
};

// 마법의 수신기 켜기
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 개인 일기장(localStorage) 대신, 기본값을 먼저 준비합니다.
let devBgTextActive = false;
let devBgText = "PEANUT RACE, MUTANT MODE, AWAKENING";
let devBgColor = "#00e5ff";
let devBgOpacity = 15;
let devBgCount = 15;
let devBgTextsArr = [];

let devTickerActive = true;
let devTickerText = "긴급 속보: 땅콩 레이스 절찬 진행 중! 한 치 앞을 알 수 없는 승부가 펼쳐지고 있습니다.";
let devTickerTextColor = "#ffffff";
let devTickerBgColor = "#aa0000";
let devTickerOpacity = 80;
let tickerX = 0; 

let devAds = [
    {type: 'text', data: '🥜 PEANUT RACE 🥜'},
    {type: 'text', data: '⚡ MUTANT MODE ⚡'},
    {type: 'text', data: '🏆 ULTIMATE RUN 🏆'}
];
let adItems = []; 

// 💡 핵심: 전광판(Firebase)에 누군가 새 글을 쓰면, 내 화면의 변수들을 즉시 덮어쓰고 화면을 새로고침합니다.
db.ref('peanutRace/devSettings').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        devBgTextActive = data.devBgTextActive !== undefined ? data.devBgTextActive : devBgTextActive;
        devBgText = data.devBgText || devBgText;
        devBgColor = data.devBgColor || devBgColor;
        devBgOpacity = data.devBgOpacity !== undefined ? data.devBgOpacity : devBgOpacity;
        devBgCount = data.devBgCount !== undefined ? data.devBgCount : devBgCount;
        
        devTickerActive = data.devTickerActive !== undefined ? data.devTickerActive : devTickerActive;
        devTickerText = data.devTickerText || devTickerText;
        devTickerTextColor = data.devTickerTextColor || devTickerTextColor;
        devTickerBgColor = data.devTickerBgColor || devTickerBgColor;
        devTickerOpacity = data.devTickerOpacity !== undefined ? data.devTickerOpacity : devTickerOpacity;
        
        if (data.devAds) devAds = data.devAds;
        
        // 전광판의 내용이 내 화면에 즉시 물들도록 재계산합니다.
        initDevBgTexts(); 
        loadAdItems();
    }
}); 

// 💡 과거에 저장되어 있던 무거운 원본 배너 이미지들을 찾아내어 자동으로 압축합니다.
devAds.forEach((ad, idx) => {
  // 데이터 길이가 100,000자(약 100KB)를 넘어가면 무거운 원본으로 간주하고 압축을 실행합니다.
  if (ad.type === 'img' && ad.data.length > 100000) {
    let domImg = new Image();
    domImg.onload = () => {
      let offC = document.createElement('canvas');
      let targetW = 300; // 배너에 맞게 너비를 300px로 축소
      let targetH = targetW * (domImg.height / domImg.width);
      offC.width = targetW; 
      offC.height = targetH;
      let ctx = offC.getContext('2d');
      ctx.drawImage(domImg, 0, 0, targetW, targetH);
      
      // 용량이 적은 JPEG 포맷(품질 85%)으로 재인코딩
      let compressedBase64 = offC.toDataURL('image/jpeg', 0.85); 
      devAds[idx].data = compressedBase64; // 기존 무거운 데이터를 가벼운 데이터로 교체
      
      // 가벼워진 상태를 로컬스토리지에 영구적으로 덮어씁니다.
      localStorage.setItem('devAds', JSON.stringify(devAds));
      
      // 압축된 이미지로 다시 로드합니다.
      loadAdItems(); 
    };
    domImg.src = ad.data;
  }
});

document.getElementById('fsBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }
});
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    document.getElementById('fsBtn').innerText = '🔲 WINDOWED';
  } else {
    document.getElementById('fsBtn').innerText = '🔲 FULLSCREEN';
  }
});

document.addEventListener('keydown', (e) => {
  if (e.altKey && (e.key === 'a' || e.key === 'A')) {
    e.preventDefault();
    // 💡 더 이상 자바스크립트 안에 비밀번호의 정답을 노출해두지 않습니다.
    let pwd = prompt('창조자의 열쇠(비밀번호)를 입력하세요.');
    
    if (pwd) {
      // 입력받은 비밀번호를 들고 Firebase의 굳게 닫힌 문을 두드립니다.
      firebase.auth().signInWithEmailAndPassword("lidotoryil@naver.com", pwd)
        .then((userCredential) => {
          // 열쇠가 맞아 문이 열리면, 비로소 개발자 모드 창을 띄웁니다.
          openDevMode(); 
        })
        .catch((error) => {
          // 열쇠가 틀리면 접근을 부드럽게 차단합니다.
          alert('접근이 거부되었습니다. 세계의 질서를 지키는 열쇠가 맞는지 확인해 주세요.');
        });
    }
  }
});

// 💡 스마트폰 풀스크린 모드용 두 손가락 줌인(Pinch Zoom) 감각 기관
let uiContainerElt = document.getElementById('ui-container');
let uiZoomLevel = 1.0;
let initialPinchDist = null;

uiContainerElt.addEventListener('touchstart', (e) => {
  // 손가락 두 개가 화면에 닿았을 때, 두 점 사이의 거리를 기억합니다.
  if (e.touches.length === 2) {
    initialPinchDist = Math.hypot(
      e.touches[0].pageX - e.touches[1].pageX,
      e.touches[0].pageY - e.touches[1].pageY
    );
  }
}, { passive: false });

uiContainerElt.addEventListener('touchmove', (e) => {
  // 두 손가락이 움직일 때
  if (e.touches.length === 2 && initialPinchDist !== null) {
    e.preventDefault(); // 기본 스크롤과 충돌하며 화면이 떨리는 현상을 막아줍니다.
    
    let currentDist = Math.hypot(
      e.touches[0].pageX - e.touches[1].pageX,
      e.touches[0].pageY - e.touches[1].pageY
    );
    
    // 손가락이 벌어진 비율만큼 창을 부드럽게 부풀립니다. (1배 ~ 최대 3배까지)
    let scaleChange = currentDist / initialPinchDist;
    uiZoomLevel = Math.min(Math.max(1.0, uiZoomLevel * scaleChange), 3.0); 
    
    // 화면의 중앙을 기준으로 크기를 조율합니다.
    uiContainerElt.style.transform = `translate(-50%, -50%) scale(${uiZoomLevel})`;
    
    // 다음 찰나의 순간을 위해 거리를 갱신합니다.
    initialPinchDist = currentDist; 
  }
}, { passive: false });

uiContainerElt.addEventListener('touchend', (e) => {
  // 손가락 하나라도 떨어지면 줌인 동작을 멈춥니다. (한 손가락 스크롤을 위해)
  if (e.touches.length < 2) {
    initialPinchDist = null;
  }
});
  
function loadAdItems() {
    adItems = [];
    let adWidth = 70; // 💡 배너의 고정 너비
    
    devAds.forEach((ad) => {
        if (ad.type === 'text') {
            adItems.push({ type: 'text', data: ad.data, h: 250 });
        } else if (ad.type === 'img') {
            let item = { type: 'img', imgObj: null, h: 300 }; 
            loadImage(ad.data, (img) => {
                // 원본 비율에 맞춰 배너의 길이를 정수로 계산합니다.
                item.h = Math.floor(80 * (img.width / img.height)); 
                
                // 💡 핵심 최적화: 매 프레임 렌더링 부하를 막기 위해,
                // 메모리에 올릴 때부터 실제로 그려질 크기로 픽셀을 완전히 잘라냅니다.
                if(img.width > 0 && img.height > 0) {
                    img.resize(item.h, adWidth); 
                }
                
                item.imgObj = img;
            });
            adItems.push(item);
        }
    });
}

function openDevMode() {
  if (document.getElementById('dev-modal')) return;
  let modal = createDiv(''); modal.id('dev-modal'); modal.parent(select('#ui-container')); modal.class('glass-panel'); 
  modal.style('position', 'absolute'); modal.style('top', '50%'); modal.style('left', '50%'); 
  modal.style('transform', 'translate(-50%, -50%)'); modal.style('width', '500px'); modal.style('padding', '30px'); 
  modal.style('z-index', '999'); modal.style('display', 'flex'); modal.style('flex-direction', 'column');
  modal.style('max-height', '85vh'); modal.style('overflow-y', 'auto');

  let title = createElement('h2', '🛠️ DEVELOPER MODE'); title.parent(modal); title.style('color', '#00e5ff'); title.style('text-align', 'center'); title.style('margin-top', '0');

  let makeRow = (parentDiv, labelStr) => {
      let r = createDiv(''); r.parent(parentDiv);
      r.style('display', 'flex'); r.style('align-items', 'center'); r.style('justify-content', 'space-between'); r.style('margin-bottom', '12px');
      let lbl = createSpan(labelStr); lbl.parent(r); lbl.style('color', '#fff'); lbl.style('font-size', '13px'); lbl.style('flex-shrink', '0');
      return r;
  }

  let adDiv = createDiv(''); adDiv.parent(modal);
  adDiv.style('background', 'rgba(255,255,255,0.03)'); adDiv.style('border', '1px solid rgba(255,255,255,0.1)');
  adDiv.style('padding', '20px'); adDiv.style('border-radius', '8px'); adDiv.style('margin-bottom', '15px');
  let adTitle = createDiv('🛤️ 양쪽 광고 트랙 (배너/텍스트)'); adTitle.parent(adDiv);
  adTitle.style('color', '#55ffaa'); adTitle.style('margin-bottom', '15px'); adTitle.style('font-weight', 'bold');

  let adInputRow = createDiv(''); adInputRow.parent(adDiv); adInputRow.style('display', 'flex'); adInputRow.style('gap', '5px'); adInputRow.style('margin-bottom', '10px');
  let textAdInp = createInput(''); textAdInp.parent(adInputRow); textAdInp.class('modern-input'); textAdInp.style('flex-grow', '1'); textAdInp.attribute('placeholder', '광고 문구 입력');
  let addTextBtn = createButton('+ 텍스트'); addTextBtn.parent(adInputRow); addTextBtn.class('ghost-btn'); addTextBtn.style('padding', '5px 10px');
  
  let fileAdWrap = createDiv(''); fileAdWrap.parent(adDiv); fileAdWrap.style('display', 'flex'); fileAdWrap.style('align-items', 'center'); fileAdWrap.style('justify-content', 'space-between'); fileAdWrap.style('margin-bottom', '15px');
  let fileAdLabel = createSpan('배너 이미지 첨부: '); fileAdLabel.parent(fileAdWrap); fileAdLabel.style('color', '#ccc'); fileAdLabel.style('font-size', '12px');
let fileAdInp = createFileInput((file) => {
      if (file.type === 'image') {
          let domImg = new Image();
          domImg.onload = () => {
              let offC = document.createElement('canvas');
              let targetW = 300; let targetH = targetW * (domImg.height / domImg.width);
              offC.width = targetW; offC.height = targetH;
              let ctx = offC.getContext('2d');
              ctx.drawImage(domImg, 0, 0, targetW, targetH);
              let base64 = offC.toDataURL('image/jpeg', 0.85); 
              
              devAds.push({type: 'img', data: base64});
              
              // 💡 내 일기장(localStorage)에 적던 것을 지우고,
              // 새 이미지가 추가된 목록을 마을의 전광판(Firebase)으로 쏘아 올립니다.
              db.ref('peanutRace/devSettings').update({ devAds: devAds });
              
              loadAdItems(); renderAdList();
          };
          domImg.src = file.data;
      }
  });
  fileAdInp.parent(fileAdWrap); fileAdInp.style('color', '#aaa'); fileAdInp.style('font-size', '11px');

  let adListDiv = createDiv(''); adListDiv.parent(adDiv); adListDiv.style('max-height', '150px'); adListDiv.style('overflow-y', 'auto');
  
  function renderAdList() {
      adListDiv.html('');
      devAds.forEach((ad, i) => {
          let row = createDiv(''); row.parent(adListDiv); row.class('ad-item-row');
          let txt = ad.type === 'text' ? `📝 ${ad.data}` : `🖼️ [이미지 배너]`;
          let span = createDiv(txt); span.parent(row); span.class('ad-item-text');
          let delBtn = createButton('❌'); delBtn.parent(row); delBtn.class('ghost-btn'); delBtn.style('padding', '2px 6px'); delBtn.style('font-size', '10px');
delBtn.mousePressed(() => {
              devAds.splice(i, 1); // 💡 목록에서 해당 광고를 빼냅니다.
              
              // 💡 내 일기장(localStorage) 코드를 지우고, 
              // 하나가 지워진 새로운 목록을 하늘의 전광판(Firebase)으로 쏘아 올립니다.
              db.ref('peanutRace/devSettings').update({ devAds: devAds });
              
              loadAdItems(); renderAdList();
          });
      });
  }
  
addTextBtn.mousePressed(() => {
      if (textAdInp.value().trim() !== '') {
          devAds.push({type: 'text', data: textAdInp.value()});
          
          // 💡 내 일기장(localStorage)에 쓰던 것을 지우고, 
          // 이제는 하늘의 전광판(Firebase)에 새로운 광고 목록을 통째로 보냅니다.
          db.ref('peanutRace/devSettings').update({ devAds: devAds });
          
          loadAdItems(); renderAdList();
          textAdInp.value('');
      }
  });
  renderAdList();

  let stDiv = createDiv(''); stDiv.parent(modal);
  stDiv.style('background', 'rgba(255,255,255,0.03)'); stDiv.style('border', '1px solid rgba(255,255,255,0.1)');
  stDiv.style('padding', '20px'); stDiv.style('border-radius', '8px'); stDiv.style('margin-bottom', '15px');
  let stTitle = createDiv('🌊 배경 흐름 텍스트 설정'); stTitle.parent(stDiv);
  stTitle.style('color', '#88aaff'); stTitle.style('margin-bottom', '15px'); stTitle.style('font-weight', 'bold');

  let str0 = makeRow(stDiv, '배경 흐름 텍스트 활성화');
  let cbBgText = createCheckbox('', devBgTextActive); cbBgText.parent(str0);

  let r1 = makeRow(stDiv, '텍스트 문구<br><span style="font-size:10px;color:#aaa;">(쉼표로 구분하여 여러 개 등록)</span>');
  let inpText = createInput(devBgText); inpText.parent(r1); inpText.class('modern-input'); inpText.style('width', '220px');

  let r2 = makeRow(stDiv, '텍스트 색상');
  let inpColor = createInput(devBgColor, 'color'); inpColor.parent(r2); inpColor.style('cursor', 'pointer'); inpColor.style('background', 'none'); inpColor.style('border', 'none');

  let r3 = makeRow(stDiv, '투명도 (0~100)');

function initDevBgTexts() {
  devBgTextsArr = [];
  if (!devBgTextActive || devBgCount <= 0 || !devBgText || devBgText.trim() === "") return;
  
  let txts = devBgText.split(',').map(s => s.trim()).filter(s => s !== "");
  if (txts.length === 0) return;

  let safeCount = min(devBgCount, 150); 
  let lanes = Math.max(1, Math.min(safeCount, Math.floor(width / 200))); 
  let itemsPerLane = Math.ceil(safeCount / lanes);
  let laneWidth = width / lanes;
  
  let idx = 0;
  for(let l = 0; l < lanes; l++) {
      let laneSpeed = random(0.8, 1.8); 
      let laneOffsetY = random(-500, 0); 
      
      for(let i = 0; i < itemsPerLane; i++) {
          if (idx >= safeCount) break;
          let randomTxt = random(txts);
          devBgTextsArr.push({
              text: randomTxt,
              lane: l,
              x: l * laneWidth + laneWidth / 2,
              y: laneOffsetY + i * 250 + random(0, 50),
              speed: laneSpeed
          });
          idx++;
      }
  }
}

function drawDevBgTexts() {
  if (!devBgTextActive || devBgTextsArr.length === 0) return;
  push();
  textAlign(CENTER, CENTER);
  textFont('Orbitron'); 
  let col = color(devBgColor); col.setAlpha(devBgOpacity);
  fill(col); noStroke();
  let lanes = Math.max(1, Math.min(devBgCount, Math.floor(width / 200)));
  let laneWidth = width / lanes;
  textSize(constrain(laneWidth * 0.12, 14, 30)); 
  
  for(let t of devBgTextsArr) {
      t.y += t.speed; 
      if(t.y > height + 100) {
          let minY = height + 100;
          for(let other of devBgTextsArr) { if (other.lane === t.lane && other !== t) { if (other.y < minY) minY = other.y; } }
          t.y = Math.min(-100, minY - 250);
      }
      
      let worldX = (t.x - width/2) / camScale - camX + width/(2*camScale);
      let worldY = (t.y - height/2) / camScale - camY + height/(2*camScale);
      let tIdx = constrain(floor(worldY / 40), 0, track.length - 1);
      let trk = track[tIdx];
      
      if (!trk || worldX < trk.left - 50 || worldX > trk.right + 50) {
          text(t.text, t.x, t.y);
      }
  }
  pop();
}

function drawAdTrack(vTop, vBottom) {
    if (adItems.length === 0 || track.length === 0) return;
    
    let adWidth = 70;  
    
    // 💡 광고판들의 전체 높이를 먼저 계산하여, 불필요한 앞선 연산을 건너뜁니다.
    let totalAdHeight = 0;
    for (let item of adItems) totalAdHeight += item.h;
    if (totalAdHeight === 0) return;

    for (let side of ['left', 'right']) {
        // 💡 화면 꼭대기(vTop)에서 가장 가까운 배너 시작점(수학적 계산)으로 단숨에 이동합니다.
        let startCycle = Math.max(0, Math.floor(vTop / totalAdHeight));
        let currentY = startCycle * totalAdHeight;
        
        while (currentY < vBottom + 500 && currentY < WORLD_HEIGHT - 500) {
            for (let item of adItems) {
                let yStart = currentY;
                let yEnd = currentY + item.h;
                
                if (yEnd > vTop && yStart < vBottom) {
                    drawCurvedAdItem(item, side, yStart, yEnd, adWidth);
                }
                currentY += item.h; 
            }
        }
    }
}

function drawCurvedAdItem(item, side, yStart, yEnd, adWidth) {
    let midY = (yStart + yEnd) / 2;
    let tIdx = constrain(floor(midY / 40), 0, track.length - 1);
    let t = track[tIdx];
    if(!t) return;
    
    let smoothOffset = 600; 
    let xPos = side === 'left' ? t.center - smoothOffset : t.center + smoothOffset;
    
    let tNext = track[constrain(tIdx + 1, 0, track.length - 1)];
    let angle = atan2(tNext.center - t.center, 40); 
    
    push();
    translate(xPos, midY);
    rotate(-angle); 
    
    if (side === 'left') {
        rotate(-PI);
    }
    
    if (item.type === 'text') {
        fill(30, 20, 30, 180); stroke(0, 0, 100, 30); strokeWeight(2);
        rect(-adWidth/2, -item.h/2, adWidth, item.h);
        fill(0, 0, 100); noStroke(); textAlign(CENTER, CENTER);
        textSize(24); textFont('Orbitron');
        push(); rotate(HALF_PI); text(item.data, 0, 0); pop();
    } else if (item.type === 'img' && item.imgObj) {
        imageMode(CENTER);
        push(); 
        rotate(HALF_PI); 
        // 💡 최적화: 이미 로드할 때 크기를 딱 맞췄으므로, 크기 변환(Scaling) 연산 없이 원본 그대로 빠르게 도장 찍듯 그립니다.
        image(item.imgObj, 0, 0); 
        pop();
        
        noFill(); stroke(0, 0, 100, 20); strokeWeight(2); rect(-adWidth/2, -item.h/2, adWidth, item.h);
    }
    
    fill(0, 0, 100, 50); noStroke(); 
    rect(-adWidth/2, -item.h/2 - 2, adWidth, 4); 
    rect(-adWidth/2, item.h/2 - 2, adWidth, 4);  
    
    pop();
}
  function drawTicker() {
  if (!devTickerActive || devTickerText.trim() === "") return;
  push();
  let th = 40; 
  let ty = height - th; 
  
  let bgCol = color(devTickerBgColor);
  bgCol.setAlpha(map(devTickerOpacity, 0, 100, 0, 255));
  noStroke(); fill(bgCol);
  rect(0, ty, width, th);
  
  textSize(18); textFont('Noto Sans KR');
  let tCol = color(devTickerTextColor);
  tCol.setAlpha(min(255, map(devTickerOpacity, 0, 100, 0, 255) + 100)); 
  fill(tCol); textAlign(LEFT, CENTER);
  
  text(devTickerText, tickerX, ty + th / 2 - 2);
  
  if(!isPaused) tickerX -= 2.5; 
  let tw = textWidth(devTickerText);
  if (tickerX < -tw) { tickerX = width; } 
  pop();
}

function initWorld() {

  balls = []; spinners = []; staticPins = []; track = []; blackholePads = []; bricks = []; particles = []; shrinkPads = []; growPads = []; ripples = []; swapPads = []; specialEffects = []; announcements = []; electricTraps = []; soapBubbles = []; bubbleZones = []; wallBars = []; mutantFlares = []; wailingWalls = []; prisms = []; guardians = [];
  globalGuardianActive = false; globalGuardianTeam = null; globalGuardianTimer = 0; globalGuardianColor = null; flashColor = null; flashLife = 0; cameraShake = 0; zoomTimer = 0; targetDynamicZoom = 1.0; 
  camX = 0; camY = 0; camScale = 0.5; raceFinished = false; targetBall = null; manualFocus = false; finishCounter = 0; rankScrollY = 0; rankTargetScrollY = 0;
  numSegments = 5; segmentLength = WORLD_HEIGHT / numSegments; segmentCrossed = {}; segmentWinners = {}; 
  for(let i=1; i<=numSegments; i++) segmentCrossed[i] = false; 
  teamSegmentWins = { RED: 0, BLUE: 0, GREEN: 0, YELLOW: 0, PURPLE: 0, ORANGE: 0, CYAN: 0, PINK: 0 }; sectionBannerTimer = 0; sectionBannerText = ""; sectionBannerColor = null;
  bgStars = []; for (let i = 0; i < 400; i++) bgStars.push({ x: random(-3000, 3000), y: random(-1000, WORLD_HEIGHT + 2000), r: random(1, 4), blink: random(TWO_PI), speed: random(0.01, 0.05) });
  
  let trackSeed = random(1000); 
  for (let y = 0; y <= WORLD_HEIGHT; y += 40) {
    let yRatio = y / WORLD_HEIGHT; let centerX = 0 + sin(y * 0.0008 + trackSeed) * 350 + cos(y * 0.0015 + trackSeed/2) * 120;
    let baseW = map(yRatio, 0, 1, 500, 300); let bulge = sin(y * 0.001) > 0.5 ? sin((y * 0.001 - 0.5) * PI) * 350 : 0; let noiseW = (noise(y * 0.005 + trackSeed) - 0.5) * 100;
    let w = constrain(baseW + bulge + noiseW, 250, 900); if (isBrickZone(yRatio)) w = 500; 
    let isBump = (y > 0 && y % 320 === 0 && !isBrickZone(yRatio)); let bumpW = isBump ? 25 : 0;
    let hueVal = (y / 40 + trackSeed) % 360; let cStr = color(hueVal, 80, 100).toString();
    track.push({ y, left: centerX - w/2 + bumpW, right: centerX + w/2 - bumpW, center: centerX, hue: hueVal, cStr: cStr, isBump: isBump });
  }

  balls = [];

    let numRandomTeams = parseInt(randomTeamCountSelect.value());
    let availableTeams = ['RED', 'BLUE', 'GREEN', 'YELLOW', 'PURPLE', 'ORANGE', 'CYAN', 'PINK'].slice(0, numRandomTeams);
    let shuffled = [...customPlayersData];
    for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
    shuffled.forEach((p, idx) => { p.assignedTeam = availableTeams[idx % numRandomTeams]; });
  } else if (useTeamBattle) {
    customPlayersData.forEach(p => p.assignedTeam = p.teamPref);
  }

  customPlayersData.forEach((pData, i) => {
    // 💡 최적화: 인원이 많을수록 출발선의 간격을 넓게 벌려, 서로 짓눌려 멈추는 현상을 방지합니다.
    let startSpread = max(20, 600 / customPlayersData.length); 
    let startX = 0 + (i - customPlayersData.length/2) * startSpread + random(-5, 5);

  constellationSpots = []; constellationEdges = []; let n = balls.length;
  for (let i = 0; i < n; i++) {
    let angle = map(i, 0, n, -HALF_PI, TWO_PI - HALF_PI); let r = (i % 2 === 0 && n > 4) ? 140 : 70; if (n <= 4) r = 100; 
    constellationSpots.push({ x: 0 + cos(angle) * r, y: WORLD_HEIGHT + 600 + sin(angle) * r });
    constellationEdges.push([i, (i + 1) % n]); if (n > 4) constellationEdges.push([i, (i + 2) % n]);

    barY += random(600, 1200);
  }

  for (let y = 700; y < WORLD_HEIGHT - 500; y += 150) {
    if (isBrickZone(y / WORLD_HEIGHT)) continue; let tIdx = floor(y / 40);
    if (tIdx >= 0 && tIdx < track.length) {
      let t = track[tIdx]; let rowIdx = floor(y / 150); let colIdx = 0; let rowOffset = (rowIdx % 2 === 0) ? 0 : 75;
      for (let x = t.left + 70; x < t.right - 70; x += 150) { let pinType = 'normal'; let randVal = random(1); if (randVal < 0.02) pinType = 'fast'; else if (randVal < 0.04) pinType = 'slow'; let pinGroup = (rowIdx + colIdx) % 2; staticPins.push(new StaticPin(x + rowOffset + random(-10, 10), y + random(-10, 10), pinType, pinGroup)); colIdx++; }
    }
  }

  let currentY = 1200; let obstacleTypes = ['spinner', 'shrink', 'grow', 'swap', 'electric', 'bubble'];
  while (currentY < WORLD_HEIGHT - 1500) {

    if (tIdx >= 0 && tIdx < track.length) {
      let t = track[tIdx]; let tWidth = t.right - t.left; let type = random(obstacleTypes);
      if (tWidth >= 550 && random(1) < 0.15) { type = 'blackhole'; }
      if (type === 'spinner') spinners.push(new Spinner(getScatteredX(t, 90), currentY, 160, 15, random(-0.12, 0.12)));
      else if (type === 'blackhole') blackholePads.push(new BlackholePad(getScatteredX(t, 80), currentY, 146, 106));
      else if (type === 'shrink') shrinkPads.push(new ShrinkPad(getScatteredX(t, 60), currentY, 110));
      else if (type === 'grow') growPads.push(new GrowPad(getScatteredX(t, 60), currentY, 110));
      else if (type === 'swap') swapPads.push(new SwapPad(getScatteredX(t, 60), currentY, 45));

      else if (type === 'bubble' && useBubbleTrap) bubbleZones.push({ yStart: currentY - 200, yEnd: currentY + 600 });
    }
    currentY += random(1000, 1500);

  let brickW = 60; let brickH = 25;
  for (let z of BRICK_ZONES) {
    for (let y = WORLD_HEIGHT * z.start; y < WORLD_HEIGHT * z.end; y += brickH + 5) {
      let tIdx = floor(y / 40); if (tIdx >= 0 && tIdx < track.length) { let t = track[tIdx]; for (let x = t.left + brickW/2; x < t.right - brickW/2; x += brickW + 2) bricks.push(new Brick(x, y, brickW, brickH)); }
    }
  }
}

function draw() {
  background(260, 80, 5); 
  if (!gameStarted) return; 
  
  drawDevBgTexts(); 

  let t = i18n[currentLang];
  let unfinishedBalls = balls.filter(b => !b.finished && !b.destroyed); let lastBallRemaining = unfinishedBalls.length === 1 ? unfinishedBalls[0] : null;
  let activeRunners = [...unfinishedBalls].sort((a, b) => b.y - a.y);
  
  if (!isPaused) {
    framesSinceStart++; 
    if (frameCount % 60 === 0 && activeRunners.length > 0) { let lastY = activeRunners[activeRunners.length - 1].y; sweepThePast(lastY); }
    if (globalGuardianTimer > 0) { globalGuardianTimer--; if (globalGuardianTimer <= 0) globalGuardianActive = false; }
    for (let i = 1; i < activeRunners.length; i++) {
      let current = activeRunners[i]; let ahead = activeRunners[i-1]; let gap = ahead.y - current.y;
      if (gap > 1200 && !current.hasCatchUpShield) { current.hasCatchUpShield = true; playIceSound(current.x, current.y); } 
      else if (gap < 400 && current.hasCatchUpShield) { current.hasCatchUpShield = false; createParticles(current.x, current.y, color(150, 80, 100), 10); }
    }
    if(activeRunners.length > 0) activeRunners[0].hasCatchUpShield = false;
  }

  let leadBall = activeRunners.length > 0 ? activeRunners[0] : balls.find(b => !b.destroyed); 
  if (endingFairyTimer > 0 && firstWinner) { targetBall = firstWinner; if(!isPaused) endingFairyTimer--; }
  else if (leadBall && !manualFocus) { targetBall = leadBall; }

  // 💡 우주의 핑거스냅 발동 검사
  if (!isPaused && activeCosmicSnap && !cosmicSnapTriggered && leadBall) {
      let triggerY = (WORLD_HEIGHT / numSegments) * 4; // 4구간 지점
      if (leadBall.y >= triggerY) {
          cosmicSnapTriggered = true;
          addEventLog(null, t.ann_cosmic_snap, color(280, 100, 100), true);
          sectionBannerTimer = 180; 
          sectionBannerColor = color(280, 100, 100); 
          sectionBannerText = t.ann_cosmic_snap; 
          playBombSound(leadBall.x, leadBall.y);
          
          let aliveBalls = balls.filter(b => !b.destroyed && !b.finished);
          let starCount = Math.floor(aliveBalls.length / 2);
          if (starCount < 1 && aliveBalls.length > 1) starCount = 1; // 최소 1개는 생성
          
          for (let i = 0; i < starCount; i++) {
              let tIdx = constrain(floor((leadBall.y + 1500) / 40), 0, track.length - 1);
              let spawnX = track[tIdx] ? track[tIdx].center + random(-200, 200) : 0;
              // 선두보다 한참 먼 밑바닥(우주)에서부터 역방향으로 치솟아 오릅니다.
              cosmicStars.push(new CosmicStar(spawnX, leadBall.y + random(1000, 2500)));
          }
      }
  }

  if (!isPaused && useTeamBattle && !raceFinished) {
    for (let i = 1; i < numSegments; i++) {
      let segY = i * segmentLength;
      if (!segmentCrossed[i]) {
        let crossedBalls = balls.filter(b => b.y >= segY && !b.destroyed).sort((a,b) => b.y - a.y);
        if (crossedBalls.length > 0) {
          let winnerOfSection = crossedBalls[0]; 
          segmentCrossed[i] = true; 
          teamSegmentWins[winnerOfSection.team]++; 
          segmentWinners[i] = winnerOfSection;
          sectionBannerTimer = 180; sectionBannerColor = winnerOfSection.color; sectionBannerText = t.section_pass(i, winnerOfSection.name, getTeamName(winnerOfSection.team, t)); playSwapSound(winnerOfSection.x, winnerOfSection.y);
        }
      }
    }
  }

  let allDone = balls.every(b => b.finished || b.destroyed);
  if (allDone && !raceFinished) { raceFinished = true; constellationTimer = 120; } 
  if (!isPaused && raceFinished && constellationTimer > 0) { constellationTimer--; }

  let firstPlaceFinished = balls.some(b => b.finished);

  if (!raceFinished && targetBall) {
    let targetScale;
    let baseScaleForAction = map(targetBall.y, 0, WORLD_HEIGHT, 0.75, 1.1, true); 
    let speedZoom = constrain(targetBall.vy * 0.025, 0, 0.4); 
    let idealActionScale = max(0.35, baseScaleForAction - speedZoom);
    
    if (!firstPlaceFinished && targetBall.y > WORLD_HEIGHT - 3000) {
        let zoomInFactor = map(targetBall.y, WORLD_HEIGHT - 3000, WORLD_HEIGHT, 1.0, 1.8, true);
        idealActionScale *= zoomInFactor;
    }
    
    if (cameraMode === 0) { targetScale = 0.45; if (!isPaused && zoomTimer > 0) zoomTimer--; } 
    else if (cameraMode === 2) { targetScale = 1.3; if (!isPaused && zoomTimer > 0) zoomTimer--; } 
    else { 
      if (!isPaused && zoomTimer > 0) { zoomTimer--; targetDynamicZoom = lerp(targetDynamicZoom, targetDynamicZoom * 0.98 + idealActionScale * 0.02, 0.1); targetScale = targetDynamicZoom; } 
      else { targetDynamicZoom = lerp(targetDynamicZoom, idealActionScale, 0.05); targetScale = targetDynamicZoom; } 
    }
    
    let baseLerp = endingFairyTimer > 0 ? 0.1 : 0.04; 
    let scaleLerpSpeed = cameraMode === 1 ? 0.03 : baseLerp; 
    
    if(!isPaused) {
      camScale = lerp(camScale, targetScale, scaleLerpSpeed); 
      camX = lerp(camX, width / (2 * camScale) - targetBall.x, baseLerp * 2.5); 
      camY = lerp(camY, height / (2 * camScale) - targetBall.y, baseLerp * 2.5);
      if (cameraShake > 0.1) { if (cameraMode === 1) { camX += random(-cameraShake, cameraShake) / camScale; camY += random(-cameraShake, cameraShake) / camScale; } cameraShake *= 0.85; }
    }
  } else if (!isPaused) { 
    camScale = lerp(camScale, 0.85, 0.02); 
    camX = lerp(camX, width / (2 * camScale) - 0, 0.05); 
    camY = lerp(camY, height / (2 * camScale) - (WORLD_HEIGHT + 600), 0.05); 
  }

  push(); scale(camScale); translate(camX, camY);
  let viewTop = targetBall ? targetBall.y - (height / camScale) * 1.5 : 0; let viewBottom = targetBall ? targetBall.y + (height / camScale) * 1.5 : WORLD_HEIGHT;
  
  drawAdTrack(viewTop, viewBottom);
  drawBackgroundGrid(viewTop, viewBottom); drawTrack(viewTop, viewBottom); drawSegments(viewTop, viewBottom);

  guardians.forEach(g => { if(!isPaused) g.update(balls); if (g.y > viewTop - 500 && g.y < viewBottom + 500) g.display(); if(!isPaused) g.applyEffect(balls); });
  wallBars.forEach(wb => { if (wb.y > viewTop && wb.y < viewBottom) wb.display(); });

  if (useBubbleTrap && !isPaused) { bubbleZones.forEach(zone => { let anyBallInZone = balls.some(b => !b.destroyed && b.y >= zone.yStart && b.y <= zone.yEnd); if (anyBallInZone && frameCount % 150 === 0 && soapBubbles.length < 8) { let tIdx = floor(zone.yEnd / 40); if(tIdx >= 0 && tIdx < track.length) soapBubbles.push(new SoapBubble(random(track[tIdx].left + 50, track[tIdx].right - 50), zone.yEnd)); } }); }

  blackholePads.forEach(bh => { if (bh.y > viewTop && bh.y < viewBottom) bh.display(); }); shrinkPads.forEach(sp => { if (sp.y > viewTop && sp.y < viewBottom) sp.display(); }); growPads.forEach(gp => { if (gp.y > viewTop && gp.y < viewBottom) gp.display(); }); swapPads.forEach(sp => { if (sp.y > viewTop && sp.y < viewBottom) sp.display(); }); bricks.forEach(br => { if (br.y > viewTop && br.y < viewBottom) br.display(); }); staticPins.forEach(p => { if (p.y > viewTop && p.y < viewBottom) p.display(); }); spinners.forEach(s => { if(!isPaused) s.update(); if (s.y > viewTop && s.y < viewBottom) s.display(); }); electricTraps.forEach(et => { if (et.y > viewTop && et.y < viewBottom) et.display(); });
  
  for (let i = prisms.length - 1; i >= 0; i--) { let p = prisms[i]; if(!isPaused) p.update(); if (p.y > viewTop && p.y < viewBottom) p.display(); if (p.isDead()) prisms.splice(i, 1); }
  for (let i = soapBubbles.length - 1; i >= 0; i--) { let sb = soapBubbles[i]; if(!isPaused) sb.update(); if (sb.y > viewTop && sb.y < viewBottom) sb.display(); if (sb.popped || sb.y < 0) soapBubbles.splice(i, 1); }

  class CosmicStar {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.r = 15; // 공과 비슷한 크기의 별
    this.vx = random(-6, 6);
    this.vy = random(-9, -22); // 💡 아래에서 위로(역방향) 치솟습니다.
    this.life = 800; // 충분히 긴 시간 동안 트랙을 역주행합니다.
    this.angle = random(TWO_PI);
    this.cStr = color(280, 100, 100).toString(); // 매혹적인 보랏빛
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.angle += 0.2;
    this.life--;
  }

  checkTrackCollision() {
    let idx = constrain(floor(this.y / 40), 0, track.length - 1);
    let t = track[idx];
    if (t) {
      if (this.x < t.left + this.r) { this.x = t.left + this.r; this.vx *= -1; createParticles(this.x, this.y, color(280,100,100), 5); }
      if (this.x > t.right - this.r) { this.x = t.right - this.r; this.vx *= -1; createParticles(this.x, this.y, color(280,100,100), 5); }
    }
  }

   checkPinCollision(pins) {
    for (let i = 0; i < pins.length; i++) {
      let p = pins[i];
      // 💡 최적화: 트랙 위 수많은 핀들 중, 별과 매우 가까운(Y축 반경 50) 핀들만 골라내어 복잡한 충돌(dist) 연산을 최소화합니다.
      if (abs(this.y - p.y) > 50) continue;
      if (!p.isActive) continue;
      
      let d = dist(this.x, this.y, p.x, p.y);
      let hitRadius = (p.type === 'normal') ? p.r : p.r * 1.5;
      
      if (d < this.r + hitRadius) {
        this.vx = (this.x > p.x) ? abs(this.vx) : -abs(this.vx);
        this.vy = -abs(this.vy); 
        
        createParticles(this.x, this.y, color(280,100,100), 3);
      }
    }
  }

  checkBallCollision(balls) {
    for (let b of balls) {
      // 💡 무적 상태이거나 이미 파괴된/완주한 공은 피해갑니다.
      if (b.finished || b.destroyed || b.divineShieldTimer > 0) continue;
      let d = dist(this.x, this.y, b.x, b.y);
      if (d < this.r + b.r) {
        // 💡 충돌 시 즉시 파괴
        b.destroyed = true;
        playBombSound(b.x, b.y);
        createParticles(b.x, b.y, color(280, 100, 100), 40);
        specialEffects.push(new BombFX(b.x, b.y));
        
        let t = i18n[currentLang];
        addEventLog(b, `🌌 ${b.name} ${t.tag_destroyed}`, color(280, 100, 100), true);
        
        this.life = 0; // 별도 목적을 달성하고 소멸합니다.
        break;
      }
    }
  }

  display() {
    push(); translate(this.x, this.y); rotate(this.angle);
    let isAction = (cameraMode !== 0);
    if (!useLightMode && !isAction) { drawingContext.shadowBlur = 25; drawingContext.shadowColor = this.cStr; }
    fill(280, 80, 100); stroke(255, 150); strokeWeight(2);
    
    beginShape();
    for (let i = 0; i < 10; i++) {
      let a = i * TWO_PI / 10;
      let r = (i % 2 === 0) ? this.r * 1.5 : this.r * 0.6;
      vertex(cos(a) * r, sin(a) * r);
    }
    endShape(CLOSE);
    drawingContext.shadowBlur = 0; pop();
  }
}

    let d = dist(b.x, b.y, this.x, this.y); 
    if (d < max(this.w, this.h)/1.3 + b.r) { 
      b.vy -= (0.75 + random(-0.15, 0.15)); 
      b.vx += (b.x < this.x ? -map(d, 0, this.w, 0.5, 0.1) : map(d, 0, this.w, 0.5, 0.1)) + random(-0.2, 0.2); 
    } 
  } 
}

class ShrinkPad { 
  constructor(x, y, r) { this.x = x; this.y = y; this.r = r; this.animOffset = 0; this.cStr = color(190, 80, 100).toString(); } 
  display() { 
    this.animOffset = (this.animOffset + 2) % 60; push(); translate(this.x, this.y); noStroke(); 
    let isAction = (cameraMode !== 0);
    if (!useLightMode && !isAction) { drawingContext.shadowBlur = 25; drawingContext.shadowColor = this.cStr; } 
    fill(190, 80, 100, 30 + sin(frameCount * 0.1) * 10); ellipse(0, 0, this.r); noFill(); stroke(190, 50, 100, 80); strokeWeight(3); 
    let r1 = map(this.animOffset, 0, 60, this.r, 0); let r2 = map((this.animOffset + 30) % 60, 0, 60, this.r, 0); 
    ellipse(0, 0, r1); ellipse(0, 0, r2); drawingContext.shadowBlur = 0; pop(); 
  } 
  applyEffect(b) { 
    if (b.isLastOne || b.finished || b.destroyed || b.hasCatchUpShield || b.isDashing || b.divineShieldTimer > 0 || b.isJumping) return; 
    if (dist(b.x, b.y, this.x, this.y) < this.r/2 + b.r) { b.targetR = b.baseR * 0.55; b.sizeTimer = 300; } 
  } 
}

class GrowPad { 
  constructor(x, y, r) { this.x = x; this.y = y; this.r = r; this.animOffset = 0; this.cStr = color(30, 80, 100).toString(); } 
  display() { 
    this.animOffset = (this.animOffset + 2) % 60; push(); translate(this.x, this.y); noStroke(); 
    let isAction = (cameraMode !== 0);
    if (!useLightMode && !isAction) { drawingContext.shadowBlur = 25; drawingContext.shadowColor = this.cStr; } 
    fill(30, 80, 100, 30 + sin(frameCount * 0.1) * 10); ellipse(0, 0, this.r); noFill(); stroke(30, 50, 100, 80); strokeWeight(3); 
    let r1 = map(this.animOffset, 0, 60, 0, this.r); let r2 = map((this.animOffset + 30) % 60, 0, 60, 0, this.r); 
    ellipse(0, 0, r1); ellipse(0, 0, r2); drawingContext.shadowBlur = 0; pop(); 
  } 
  applyEffect(b) { 
    if (b.isLastOne || b.finished || b.destroyed || b.hasCatchUpShield || b.isDashing || b.divineShieldTimer > 0 || b.isJumping) return; 
    if (dist(b.x, b.y, this.x, this.y) < this.r/2 + b.r) { b.targetR = b.baseR * 2.0; b.sizeTimer = 300; } 
  } 
}

class SwapPad { 
  constructor(x, y, r) { this.x = x; this.y = y; this.r = r; this.used = false; this.angle = random(TWO_PI); this.cStr = color(45, 100, 100).toString(); } 
  display() { 
    if (this.used) return; this.angle += 0.03; push(); translate(this.x, this.y); 
    let isAction = (cameraMode !== 0);
    if (!useLightMode && !isAction) { drawingContext.shadowBlur = 40; drawingContext.shadowColor = this.cStr; } 
    noStroke(); fill(45, 80, 100, 40 + sin(frameCount * 0.1) * 20); ellipse(0, 0, this.r * 2.5); rotate(this.angle); stroke(45, 60, 100, 90); strokeWeight(3); noFill(); ellipse(0, 0, this.r * 1.8); 
    for (let i = 0; i < 3; i++) { push(); rotate(i * TWO_PI / 3); translate(this.r * 0.9, 0); fill(45, 20, 100); noStroke(); ellipse(0, 0, 8); pop(); } 
    rotate(-this.angle * 2); stroke(45, 20, 100, 70); strokeWeight(1.5); rectMode(CENTER); rect(0, 0, this.r * 1.2, this.r * 1.2); drawingContext.shadowBlur = 0; pop(); 
  } 
  applyEffect(b, leadBall) { 
    if (this.used || b.finished || b.destroyed || b.hasCatchUpShield || !leadBall || leadBall.finished || leadBall.destroyed || b.isDashing || b.divineShieldTimer > 0 || b.isJumping) return; 
    if (b === leadBall || b.isLastOne) return; 
    let d = dist(b.x, b.y, this.x, this.y); 
    if (d < this.r + b.r) { 
      this.used = true; let tempX = b.x; let tempY = b.y; let tempVx = b.vx; let tempVy = b.vy; 
      b.x = leadBall.x; b.y = leadBall.y; b.vx = leadBall.vx; b.vy = leadBall.vy; 
      leadBall.x = tempX; leadBall.y = tempY; leadBall.vx = tempVx; leadBall.vy = tempVy; 
      playSwapSound(b.x, b.y); specialEffects.push(new SwapFX(b.x, b.y, leadBall.x, leadBall.y)); zoomTimer = 60; targetDynamicZoom = 1.6; let t = i18n[currentLang]; addEventLog(b, t.ann_swap(b.name, leadBall.name), color(45, 100, 100), true); 
    } 
  } 
}

class ElectricTrap { 
  constructor(x, y) { this.x = x; this.y = y; this.r = 30; this.angle = random(TWO_PI); this.cStr1 = color(55, 100, 100).toString(); this.cStr2 = color(180, 100, 100).toString(); } 
  display() { 
    this.angle += 0.2; push(); translate(this.x, this.y); rotate(this.angle); let isC1 = (frameCount % 6 < 3); 
    let isAction = (cameraMode !== 0);
    if (!useLightMode && !isAction) { drawingContext.shadowBlur = 25; drawingContext.shadowColor = isC1 ? this.cStr1 : this.cStr2; } 
    if (isC1) stroke(55, 100, 100); else stroke(180, 100, 100); 
    strokeWeight(3 + sin(frameCount * 0.5) * 2); noFill(); beginShape(); 
    for(let i=0; i<8; i++) { let a = i * (TWO_PI/8); let rOff = this.r + random(-10, 10); vertex(cos(a) * rOff, sin(a) * rOff); } 
    endShape(CLOSE); 
    if (isC1) fill(55, 100, 100, 50); else fill(180, 100, 100, 50); ellipse(0, 0, this.r * 0.8); drawingContext.shadowBlur = 0; pop(); 
  } 
  applyEffect(b) { 
    if (b.isLastOne || b.finished || b.destroyed || b.hasCatchUpShield || b.trapTimer > 0 || b.trapCooldown > 0 || b.isDashing || b.divineShieldTimer > 0 || b.isJumping || b.isBestDriver) return; 
    if (dist(this.x, this.y, b.x, b.y) < this.r + b.r) { b.trapTimer = 180; b.trapType = 'electric'; b.trapObj = this; playZapSound(b.x, b.y); zoomTimer = 60; targetDynamicZoom = 1.4; } 
  } 
}

class SoapBubble { 
  constructor(x, y) { this.x = x; this.y = y; this.r = random(30, 50); this.popped = false; this.wiggle = random(TWO_PI); } 
  update() { 
    this.y -= 1.5; this.wiggle += 0.05; let tIdx = floor(this.y / 40); 
    if (tIdx >= 0 && tIdx < track.length) { this.x = lerp(this.x, track[tIdx].center, 0.015); } 
    this.x += sin(this.wiggle) * 1.5; 
  } 
  display() { 
    if (this.popped) return; push(); translate(this.x, this.y); let hueVal = (frameCount * 2 + this.y) % 360; 
    let isAction = (cameraMode !== 0);
    if (!useLightMode && !isAction) { drawingContext.shadowBlur = 20; drawingContext.shadowColor = `hsla(${hueVal}, 60%, 100%, 1)`; } 
    fill(hueVal, 40, 100, 30); stroke(hueVal, 60, 100, 90); strokeWeight(2); beginShape(); 
    for(let a=0; a<TWO_PI; a+=0.5) { let rOff = this.r + sin(a * 3 + frameCount * 0.1) * 3; vertex(cos(a) * rOff, sin(a) * rOff); } 
    endShape(CLOSE); noStroke(); fill(255, 180); ellipse(-this.r*0.4, -this.r*0.4, this.r*0.3, this.r*0.2); drawingContext.shadowBlur = 0; pop(); 
  } 
  applyEffect(b) { 
    if (b.isLastOne || this.popped || b.finished || b.destroyed || b.hasCatchUpShield || b.trapTimer > 0 || b.trapCooldown > 0 || b.isDashing || b.divineShieldTimer > 0 || b.isJumping || b.isBestDriver) return; 
    if (dist(this.x, this.y, b.x, b.y) < this.r) { b.trapTimer = 180; b.trapType = 'bubble'; b.trapObj = this; playSwapSound(b.x, b.y); zoomTimer = 60; targetDynamicZoom = 1.4; } 
  } 
}
function mousePressed() { 
  if (!gameStarted) return; 

  // 💡 핵심 1: 모바일 환경에서 갱신이 느린 mouseX 대신, 화면에 닿은 '진짜 손가락의 위치(touches)'를 최우선으로 채스챕니다.
  let tX = (touches.length > 0) ? touches[0].x : mouseX;
  let tY = (touches.length > 0) ? touches[0].y : mouseY;

  if (raceFinished && endingFairyTimer <= 0 && constellationTimer <= 0) { 
    let panelH = min(height * 0.8, 650);
    let btn1Y = height/2 + panelH/2 - 170; 
    let btn2Y = height/2 + panelH/2 - 115; 
    let btn3Y = height/2 + panelH/2 - 60;
    
    if (tX > width/2 - 150 && tX < width/2 + 150 && tY > btn1Y && tY < btn1Y + 45) { initWorld(); return; } 
    else if (tX > width/2 - 150 && tX < width/2 + 150 && tY > btn2Y && tY < btn2Y + 45) { gameStarted = false; isPaused = false; document.querySelector('canvas').style.display = 'none'; createLangUI(); return; } 
    else if (tX > width/2 - 150 && tX < width/2 + 150 && tY > btn3Y && tY < btn3Y + 45) { downloadRankings(); return; }
  } 
  if (raceFinished) return;
  
  let clickedUI = false;
  let sorted = [...balls].sort((a, b) => { if(a.destroyed && !b.destroyed) return 1; if(!a.destroyed && b.destroyed) return -1; return b.y - a.y; });
  let panelWidth = useCasterMode ? 160 : 120; let panelHeight = min(250, sorted.length * 24 + 16); 
  if (tX >= 10 && tX <= 10 + panelWidth && tY >= 15 && tY <= 15 + panelHeight) {
    isRankDragging = true; rankDragStartY = tY; rankScrollStartY = rankTargetScrollY; rankDragMoved = false; clickedUI = true;
  }
  
  if (!forceFinishAll && endingFairyTimer <= 0) { 
    let btnX = width - 85, btnY = (devTickerActive && devTickerText.trim() !== "") ? height - 120 : height - 80, btnW = 75, btnH = 60; 
    if (tX >= btnX && tX <= btnX + btnW && tY >= btnY && tY <= btnY + btnH) { forceFinishAll = true; isPaused = false; let t = i18n[currentLang]; addEventLog(null, t.ann_force_finish, color(190, 80, 100), true); clickedUI = true; } 
  } 
  
  if (endingFairyTimer <= 0) { 
    let btnX = width - 85, btnY = 100, btnW = 75, btnH = 35; 
    if (tX >= btnX && tX <= btnX + btnW && tY >= btnY && tY <= btnY + btnH) { speedLevel = (speedLevel + 1) % 3; playNormalHit(1000, targetBall ? targetBall.x : 0, targetBall ? targetBall.y : height/2); clickedUI = true; }
    
    let camBtnY = 60;
    if (tX >= btnX && tX <= btnX + btnW && tY >= camBtnY && tY <= camBtnY + btnH) { cameraMode = (cameraMode + 1) % 3; playNormalHit(1000, targetBall ? targetBall.x : 0, targetBall ? targetBall.y : height/2); clickedUI = true; }
    
    let pauseBtnY = 140;
    if (tX >= btnX && tX <= btnX + btnW && tY >= pauseBtnY && tY <= pauseBtnY + btnH) { isPaused = !isPaused; playNormalHit(800, targetBall ? targetBall.x : 0, targetBall ? targetBall.y : height/2); clickedUI = true; }
    
    let muteBtnY = 180;
    if (tX >= btnX && tX <= btnX + btnW && tY >= muteBtnY && tY <= muteBtnY + btnH) { isMuted = !isMuted; clickedUI = true; }
  }
  
  if (endingFairyTimer <= 0) { 
    // 💡 핵심 2: 스마트폰의 뭉툭한 손가락을 배려하여, 눈에 보이는 버튼보다 보이지 않는 인식 범위(Hitbox)를 훨씬 넉넉하게 넓혀줍니다.
    let mmHitX = width - 120, mmHitY = 210, mmHitW = 120, mmHitH = 60;
    
    if (tX >= mmHitX && tX <= mmHitX + mmHitW && tY >= mmHitY && tY <= mmHitY + mmHitH) {
      minimapExpanded = !minimapExpanded;
      clickedUI = true;
    } 
    else if (minimapExpanded) {
      let bottomSpace = (devTickerActive && devTickerText.trim() !== "") ? 130 : 90;
      let mmBtnY = 230;
      let mmH = height - mmBtnY - bottomSpace;
      let mmBodyX = width - 85;
      let mmBodyW = 75;
      
      if (tX >= mmBodyX && tX <= mmBodyX + mmBodyW && tY > mmBtnY + 25 && tY <= mmBtnY + mmH) {
        let clickedPy = tY - (mmBtnY + 25); 
        let clickedWorldY = map(clickedPy, 0, mmH - 25, 0, WORLD_HEIGHT); 
        let closest = balls[0]; let minDist = abs(balls[0].y - clickedWorldY); 
        for(let b of balls) { let d = abs(b.y - clickedWorldY); if (d < minDist) { minDist = d; closest = b; } } 
        targetBall = closest; manualFocus = true; clickedUI = true;
      }
    }
  } 
  
  if (!clickedUI && manualFocus) { manualFocus = false; }
}

function mouseDragged() {
  if (isRankDragging) { let dy = mouseY - rankDragStartY; if (abs(dy) > 5) rankDragMoved = true; rankTargetScrollY = rankScrollStartY - dy; let maxScroll = max(0, balls.length * 24 + 16 - 250); rankTargetScrollY = constrain(rankTargetScrollY, 0, maxScroll); }
}

function mouseReleased() {
  if (isRankDragging) {
    isRankDragging = false;
    if (!rankDragMoved) {
      let clickY = mouseY - 15 + rankScrollY; let idx = floor((clickY - 5) / 24); let sorted = [...balls].sort((a, b) => { if(a.destroyed && !b.destroyed) return 1; if(!a.destroyed && b.destroyed) return -1; return b.y - a.y; });
      if (idx >= 0 && idx < sorted.length) { let b = sorted[idx]; if (targetBall === b && manualFocus) manualFocus = false; else { targetBall = b; manualFocus = true; } }
    }
  }
}

function mouseWheel(event) {
  if (!gameStarted || raceFinished) return;
  let panelWidth = useCasterMode ? 160 : 120; let panelHeight = min(250, balls.length * 24 + 16);
  if (mouseX >= 10 && mouseX <= 10 + panelWidth && mouseY >= 15 && mouseY <= 15 + panelHeight) { rankTargetScrollY += event.delta; let maxScroll = max(0, balls.length * 24 + 16 - 250); rankTargetScrollY = constrain(rankTargetScrollY, 0, maxScroll); return false; }
}
</script>
